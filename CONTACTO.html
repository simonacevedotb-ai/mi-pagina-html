<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Contacto – Simón Acevedo</title>
    <link rel="stylesheet" href="CSS/styles.css">
</head>
<body class="page-contacto">
    <header class="inicio">
        <div>
            <a href="index.html">
                <img src="IMG/ast.png.png" alt="Logo">
            </a>
        </div>
        <div>
            <nav>
                <ul>
                    <li><a href="PROYECTOS.html">PROYECTOS</a></li>
                    <li><a href="ACERCA DE MI.html">ACERCA DE MI</a></li>
                </ul>
            </nav>
        </div>
    </header>
    <main>
        <h1>CONTACTAME.</h1>

        <p>Escríbeme o envíame un correo directamente a <strong><a href="mailto:hola@simonacevedo.co">hola@simonacevedo.co</a></strong></p>

        <form>
            <div class="div-contacto">
                <label for="nombre">Nombre</label>
                <input type="text" id="nombre" name="nombre" placeholder="Tu nombre">
            </div>

            <div class="div-contacto">
                <label for="email">Correo electrónico</label>
                <input type="email" id="email" name="email" placeholder="tucorreo@ejemplo.com">
            </div>

            <div class="div-contacto">
                <label for="mensaje">Mensaje</label>
                <textarea id="mensaje" name="mensaje" placeholder="Tu mensaje"></textarea>
            </div>

            <button type="submit">Enviar mensaje</button>
        </form>
    </main>
    <footer>
        <div class="a-contacto">
            <a href="index.html">← Volver al inicio</a>
        </div>
        <div>
            <a class="icono-ig" href="https://www.instagram.com/simon.taborda15/">

            </a>
            <a class="icono-git" href="https://github.com/simonacevedotb-ai">
                <img src="IMG/github (1).png" alt="GitHub">
            </a>
            <a class="icono-face" href="https://www.facebook.com/simon.acevedo.2025/">
                <img src="IMG/facebook (1).png" alt="Facebook">
            </a>
        </div>
